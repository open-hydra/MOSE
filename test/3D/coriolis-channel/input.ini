[MOSE-Physics]
equations  = euler
rotational-frame = rigid-body

[MOSE-Rotating-Frame]
omega = 100.0
axis = 1.0 0.0 0.0
origin = 0.005 0.01 0.0

[MOSE-Numerics]
time-scheme          = RK2
cfl                  = 0.9
time-accurate        = false
irs-beta             = 0.5
space-reconstruction = MUSCL
flux-limiter         = minmod
riemann-solver       = HLLC 

[MOSE-IO]
sol-diter = 3000
shell-diter = 100
sol-format = tecplot ascii

;

[GPB-Phase1]
type = ideal-gas
species = air
gamma = 1.4
R = 287.0
Tmax = 10000

[ICB-Block1]
yAir = 1.0
T = 300.0
p = 1.054725
u = 0.0
v = 0.0
w = 10.0

[BCB-Block1]
face1 = out
face2 = out
face3 = out
face4 = out
face5 = in
face6 = out

[out]
type = 11

[in]
type = 4
g = 12.25
T = 300
yAir = 1.0

