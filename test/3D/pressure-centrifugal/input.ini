[MOSE-Physics]
equations = euler
rotational-frame = rigid-body

[MOSE-Numerics]
cfl                  = 2.0
time-scheme          = RK3
time-accurate        = false
irs-beta             = 0.5
space-reconstruction = MUSCL
riemann-solver       = HLLC 
flux-limiter         = minmod

[MOSE-IO]
shell-diter = 100
sol-diter = 1000

[MOSE-Rotating-Frame]
omega = 100.0
axis = 1.0 0.0 0.0
origin = 0.0 0.0 0.0

[ICB-Block1]
yAir = 1.0
T = 300.0
p = 1.054725e5
u = 0.0
v = 0.0
w = 0.0

[BCB-Block1]
face1 = symmetry
face2 = symmetry
face3 = symmetry
face4 = symmetry
face5 = periodic
face6 = periodic

[periodic]
type = periodic
faces = 5 6
