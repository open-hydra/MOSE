reactions:
  - equation: H2 + O2 <=> 2 OH
    rate-constant: {A: 1.7e13, b: 0.0, Ea: 47780.0}

  - equation: OH + H2 <=> H2O + H
    rate-constant: {A: 1.17e9, b: 1.3, Ea: 3626.0}
    note: D-L$W

  - equation: H + O2 <=> OH + O
    rate-constant: {A: 5.13e16, b: -0.816, Ea: 16507.0}
    note: JAM,JCP 1981

  - equation: O + H2 <=> OH + H
    rate-constant: {A: 1.8e10, b: 1.0, Ea: 8826.0}

  - equation: H + O2 + M <=> HO2 + M
    type: three-body
    rate-constant: {A: 2.1e18, b: -1.0, Ea: 0.0}
    efficiencies:
      H2O: 21.0
      H2: 3.3
      O2: 0.0
    note: SLACK

  - equation: H + O2 + O2 <=> HO2 + O2
    rate-constant: {A: 6.7e19, b: -1.42, Ea: 0.0}
