[MOSE-Parameters]
time-threshold = 250d-6

[MOSE-IO]
shell-diter = 100
sol-dtime = 10d-6
sol-overwrite = false

[MOSE-Physics]
equations = euler
chemistry = finite-rate

[MOSE-Numerics]
cfl = 0.5
time-accurate = true
time-scheme = RK2
integration-variables = cons
space-reconstruction = MUSCL-SD
flux-limiter = vanleer
riemann-solver = HLLC+

[GRIB-meshgen]
method = fmsh
type = 2Dplane

[GRIB-Block1]
pivot = 0.0 0.0 0.0
length = 12d-2
height = 1d-2
nx = 400
ny = 1

[GPB-Phase1]
reactions = kee
thermo = NASA9

[BCB-Block1]
face1 = symmetry
face2 = extrapolation
face3 = symmetry
face4 = symmetry

[ICB-Block1]
direction = x
zone1 = state1
zone2 = state2
range1 = 0.0 0.06
range2 = 0.06 1.00

[state1]
yH2 = 0.0127
yO2 = 0.1013
yAR = 0.8861
T = 378.656
u = 0.0
p = 7173.0

[state2]
yH2 = 0.0127
yO2 = 0.1013
yAR = 0.8861
T = 748.472
u = -487.34
p = 35594.0

