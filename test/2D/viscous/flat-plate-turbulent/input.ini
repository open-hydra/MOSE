[MOSE-Parameters]
iter-threshold = 100000

[MOSE-Physics]
equations  = navier-stokes
turbulence = SST

[MOSE-Numerics]
cfl                   = 1.0
vnn                   = 1.0
time-scheme           = RK3
time-accurate         = false
irs-beta              = 0.5
riemann-solver        = HLLC
flux-limiter          = vanleer
space-reconstruction  = MUSCL
integration-variables = cons

[MOSE-IO]
sol-diter = 2000
shell-diter = 100
ini-diter = 200

;

[GRIB-meshgen]
method = p3d
type = 2Dplane
inputfile = MESH/flatplate_coarse.p3d

[GPB-Phase1]
type = ideal-gas
species = air
gamma = 1.4
R = 287.0
mil = 1.1858685985e-5
Pr = 0.72

[ICB-Block1]
type = homogeneous
p0 = 1.02828
T = 555.
mach = 0.2
kappa = 2.25d-3
omega = 6250.

[BCB-Block1]
face1 = inflow
face2 = outflow
face3 = wall
face4 = symmetry

[wall]
direction = x
patch1 = symmetry
range1 = -0.333 0.
patch2 = adiabatic
range2 = 0. 2.

[inflow]
type = 4
g = 59.2934299
T = 555.
kappa = 2.25d-3
omega = 6250.

[outflow]
type = 4
p0 = 1.0
T0 = 555.
p = 1.0
kappa = 2.25d-3
omega = 6250.

[symmetry]
type = 3

[adiabatic]
type = 5
q = 0.0
