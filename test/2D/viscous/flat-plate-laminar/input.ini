[MOSE-Parameters]
iter-threshold = 100000

[MOSE-Physics]
equations = navier-stokes

[MOSE-Numerics]
cfl                   = 0.5
cfl-rise-threshold    = 0
vnn                   = 0.5
time-scheme           = RK2
time-accurate         = false
irs-beta              = 0.0
riemann-solver        = HLLC
flux-limiter          = vanleer
space-reconstruction  = MUSCL
integration-variables = cons

[MOSE-IO]
sol-diter = 1000
shell-diter = 100
ini-diter = 200

;

[GPB-Phase1]
type = ideal-gas
species = air
gamma = 1.4
R = 287.0
mil = 1.e-3
Pr = 1.0

[ICB-Block1]
type = homogeneous
p = 0.97250
T = 300.
mach = 0.2

[BCB-Block1]
face1 = ambient
face2 = wall
face3 = inflow
face4 = ambient
face5 = null
face6 = null

[null]
type = 0

[wall]
direction = x
patch1 = symmetry
range1 = -100. 0.
patch2 = adiabatic
range2 = 0. 100.

[inflow]
type = 4
g = 80.6480
T = 300.

[ambient]
type = 4
p = 0.97250
p0 = 0.97250
T0 = 300.

[symmetry]
type = 3

[adiabatic]
type = 5
q = 0.0

[extrapolation]
type = 11
