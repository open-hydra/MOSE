[MOSE-Parameters]
iter-threshold = 100000

[MOSE-Physics]
equations  = navier-stokes
turbulence = SA

[MOSE-Numerics]
cfl                   = 0.3
cfl-rise-threshold    = 1000
vnn                   = 0.1
time-scheme           = RK3
time-accurate         = false
irs-beta              = 0.0
riemann-solver        = HLLC
flux-limiter          = vanleer
space-reconstruction  = MUSCL
integration-variables = cons

[MOSE-IO]
sol-diter = 2000
shell-diter = 100
ini-diter = 200

;


[GPB-Phase1]
type = ideal-gas
species = air
gamma = 1.4
R = 287.0
mil = 1.1858685985e-5
Pr = 0.72

[ICB-Block*]
p = 0.04d+5
T = 68.3
mach = 5.0
kappa = 1d-7
omega = 100

[BCB-Block1]
face1 = inflow
face2 = outlet
face3 = isothermal
face4 = connection

[BCB-Block2]
face1 = inflow
face2 = outlet
face3 = connection
face4 = connection

[BCB-Block3]
face1 = inflow
face2 = outlet
face3 = connection
face4 = up

[up]
direction = x
patch1 = symmetry
range1 = -2.0 0.0
patch2 = isothermal
range2 = 0.0 2.0

[inflow]
type = inlet
mach = 5.0
T = 68.3
p = 0.04d+5
kappa = 1d-7
omega = 100

[isothermal]
type = wall
T = 300.0

[GRIB-meshgen]
method = gmsh
inputfile = MESH/script.geo
type = 2Dplane

[GRIB-Block1]
list = 1

[GRIB-Block2]
list = 3 4 5

[GRIB-Block3]
list = 2
