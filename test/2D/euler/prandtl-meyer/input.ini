[MOSE-Parameters]
iter-threshold = 2500

[MOSE-Physics]
equations = euler

[MOSE-Numerics]
cfl = 1.0
time-scheme = RK3
time-accurate = false
irs-beta = 0.5
riemann-solver = HLLE
space-reconstruction = MUSCL
flux-limiter = vanleer
integration-variables = cons

[MOSE-IO]
shell-diter = 100
sol-format = tecplot ascii

[MOSE-Probes]
probe1 = exit

[exit]
index-position = 1 50 33 1
variables = M
diter = 100

[BCB-Block1]
face1 = in
face2 = extrapolation
face3 = extrapolation
face4 = symmetry

[in]
type = inlet
mach = 2.0
T = 1.0
p = 1.0
