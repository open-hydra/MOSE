[MOSE-Physics]
equations = euler

[MOSE-Numerics]
cfl                   = 0.9
cfl-rise-threshold    = 100
time-scheme           = RK3
time-accurate         = false
irs-beta              = 0.3
integration-variables = cons
space-reconstruction  = MUSCL
flux-limiter          = vanleer
riemann-solver        = SLAU

[MOSE-IO]
shell-diter = 500

;

[GRIB-meshgen]
method = hmsh
axis = 1e-8
type= 2Daxi
fs = 1000

[GRIB-Block1]
profile-down = -2.728019755541108111e+02 0.0 1.134997700741056860e+03 0.0
profile-up = MESH/ideal.txt
x-definition1 = 120
y1-definition1 = 40

[GPB-Phase1]
CEA-file = CEA.inp

[ICB-Block1]
type = nozzle
eq-CEA-file = CEA.inp

[BCB-Block1]
face1 = in
face2 = extrapolation
face3 = symmetry
face4 = symmetry

[in]
type = inlet
eq-CEA-file = CEA.inp
