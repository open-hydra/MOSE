[MOSE-Parameters]
time-threshold = 4.0

[MOSE-Physics]
equations = euler

[MOSE-Numerics]
cfl = 0.8
time-accurate = true
time-scheme = RK3
riemann-solver = HLLE
space-reconstruction = MUSCL
flux-limiter = vanleer

[MOSE-IO]
shell-diter = 100
sol-overwrite = false
sol-dtime = 1.0

; End of solver input

[GRIB-tecgen]
method = fmsh
type = 2D

[GRIB-Surface1]
pivot = 0.0 0.0
length = 0.6
height = 0.2
nx = 48
ny = 16
strx = R 1.0
stry = U 1.0

[GRIB-Surface2]
pivot = 0.0 0.2
length = 3.0
height = 0.8
nx = 240
ny = 64
strx = R 1.0
stry = O 1.0

[Thermo-data]
gamma = 1.4
R = 0.714286d0
mil = 1.1858685985d-5
Pr = 0.72

[ICB-Block1]
p = 1.0e-5
T = 1.0
u = 3d0

[ICB-Block2]
p = 1.0e-5
T = 1.0
u = 3d0

[BCB-Block1]
face1 = in
face2 = symmetry
face3 = symmetry
face4 = connection

[BCB-Block2]
face1 = in
face2 = extrapolation
face3 = symmetry
face4 = symmetry

[in]
type = inlet
mach = 3.0
p = 1.0
T = 1.0
