[MOSE-Parameters]
iter-threshold = 10000

[MOSE-Physics]
equations = euler

[MOSE-Numerics]
cfl                   = 0.9
cfl-rise-threshold    = 100
time-scheme           = RK3
time-accurate         = false
irs-beta              = 0.5
space-reconstruction  = MUSCL-SD
flux-limiter          = minmod
riemann-solver = HLLE
integration-variables = cons

[MOSE-IO]
shell-diter = 100
sol-format = tecplot ascii
sol-diter = 5000

; End of solver input

[GRIB-meshgen]
outpath = MESH/
method = fmsh
type = 2Dplane

[GRIB-Block1]
list = 1 2 3

[GRIB-Surface1]
pivot = 0.0 0.0
length = 0.1
height = 0.15
nx = 20
ny = 100
strx = R 1.07
stry = D 1.00

[GRIB-Surface2]
line1 = 0.1 0.0 0.1 0.15
line2 = 0.1866 0.05 0.1866 0.15
line3 = 0.1 0.0 0.1866 0.05
line4 = 0.1 0.15 0.1866 0.15
nx = 30
ny = 100
strx = L 1.0
stry = D 1.0

[GRIB-Surface3]
line1 = 0.1866 0.05 0.1866 0.15
line2 = 0.4 0.05 0.4 0.15
line3 = 0.1866 0.05 0.4 0.05
line4 = 0.1866 0.15 0.4 0.15
nx = 45
ny = 100
strx = L 1.02
stry = D 1.00

[ICB-Block1]
mach = 3.0
p = 1.0
T = 1.0

[BCB-Block1]
face1 = in
face2 = extrapolation
face3 = symmetry
face4 = symmetry

[in]
type = inlet
mach = 3.0
p = 1.0
T = 1.0
