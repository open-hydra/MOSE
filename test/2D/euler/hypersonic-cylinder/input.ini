[MOSE-Parameters]
iter-threshold = 5000

[MOSE-Physics]
equations = euler

[MOSE-Numerics]
cfl                   = 0.5
cfl-rise-threshold    = 0
time-scheme           = RK3
time-accurate         = false
irs-beta              = 0.0
space-reconstruction  = MUSCL-SD
flux-limiter          = vanalbada
riemann-solver = HLLE
integration-variables = cons

[MOSE-IO]
shell-diter = 100
sol-diter = 5000
sol-format = tecplot ascii

; End of solver input

[GRIB-meshgen]
method = gmsh
inputfile = MESH/script.geo
type = 2Dplane

[GPB-Phase1]
type = ideal-gas
species = air
gamma = 1.4
R = 287.0
mil = 1.e-3
Pr = 1.0
Tmax = 10000

[ICB-Block1]
mach = 8.1
p = 101325
T = 288.14

[BCB-Block1]
face1 = extrapolation
face2 = extrapolation
face3 = symmetry
face4 = inflow

[inflow]
type = inlet
mach = 8.1
p = 101325
T = 288.15
alpha = 0.0
beta = 0.0
