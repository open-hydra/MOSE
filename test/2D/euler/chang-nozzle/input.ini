[MOSE-Physics]
equations = euler

[MOSE-Numerics]
cfl                   = 0.8
time-scheme           = RK3
time-accurate         = false
irs-beta              = 0.5
integration-variables = cons
space-reconstruction  = MUSCL
flux-limiter          = mc
riemann-solver        = HLLC

[MOSE-IO]
shell-diter = 500

; End of solver input

[ICB-Block1]
type = nozzle
p0 = 10.342e+5
T0 = 555.56

[BCB-Block1]
face1 = in
face2 = extrapolation
face3 = symmetry
face4 = symmetry

[in]
type = inlet
p0 = 10.342e+5
T0 = 555.56
