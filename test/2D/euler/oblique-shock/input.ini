[MOSE-Parameters]
iter-threshold = 3000

[MOSE-Physics]
equations = euler

[MOSE-Numerics]
cfl = 0.9
cfl-rise-threshold = 10
time-scheme = RK3
time-accurate = false
irs-beta = 0.5
riemann-solver = HLLE
space-reconstruction = MUSCL-SD
flux-limiter = vanalbada
integration-variables = cons

[MOSE-IO]
shell-diter = 100
sol-format = tecplot ascii

[MOSE-probes]
probe1 = exit

[exit]
index-position = 2 30 1 1
variables = M
diter = 5

;

[ICB-Block*]
p = 1.0
T = 1.0
mach = 4.0

[BCB-Block1]
face1 = in
face2 = connection
face3 = symmetry
face4 = extrapolation

[BCB-Block2]
face1 = connection
face2 = extrapolation
face3 = symmetry
face4 = extrapolation

[in]
type = inlet
mach = 4.0
alpha = 0.0
p = 1.0
T = 1.0
